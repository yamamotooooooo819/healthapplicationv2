spring.application.name=healthapp

#そこに 3つの接続設定 + JPA の動作モード を追記します。パスワード等を直接書かないでください。次のような形式で「環境変数を参照するプレースホルダ」を書くのがポイントです
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#後でステップ3で Flyway を使う予定なので、Hibernate にスキーマを自動でいじらせない設定も入れておきます（CLAUDE.md §3-1〜10 の DB 設計は Flyway で管理するため）:
spring.jpa.hibernate.ddl-auto=none

